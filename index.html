<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Arise Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="main-card">
        <div class="brand"><h1>ARISE TECH</h1><p>مجتمع صناع المستقبل</p></div>
        <div id="form-content">
            <div class="intro-text">نحن لا نكتفي باستخدام التقنية، بل <b>نصنعها</b>.</div>
            <form id="contact-form">
                <input type="text" placeholder="الاسم الثلاثي" required>
                <input type="number" placeholder="العمر" required>
                <input type="tel" placeholder="رقم الواتساب بمفتاح الدولة" required>
                <select required>
                    <option value="" disabled selected>مستواك في البرمجة؟</option>
                    <option value="0">مبتدئ</option>
                    <option value="1">متوسط</option>
                </select>
                <button type="submit" class="submit-btn">انضم للرفقة الآن</button>
            </form>
        </div>
        <div id="success-container" style="display:none">
            <span class="success-icon">✔️</span><h2>تم الاستلام!</h2>
            <div class="countdown-box">تحويل تلقائي خلال <span id="countdown">3</span> ثوانٍ...</div>
        </div>
        <div class="leadership">
            <a href="https://wa.me/96597805334" class="leader-link leader-jin">
                <img src="https://raw.githubusercontent.com/SongJinwoo1/Arise-Tech/848a4b7010596b8759551256f4c5e15432e02e6f/IMG_4768.jpeg" class="leader-avatar">
                <div class="leader-info"><span class="leader-name">سونغ جين وو</span><span class="leader-role">مؤسس Arise Tech</span></div>
            </a>
            <a href="https://wa.me/201055719273" class="leader-link leader-ayano">
                <img src="https://raw.githubusercontent.com/SongJinwoo1/Arise-Tech/848a4b7010596b8759551256f4c5e15432e02e6f/IMG_4767.jpeg" class="leader-avatar">
                <div class="leader-info"><span class="leader-name">أيانوكوجي كيوتاكا</span><span class="leader-role">المنسق الاستراتيجي</span></div>
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
